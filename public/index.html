    <style>
      :root {
        --n0: #2e3440;
        --n1: #3b4252;

        --n3: #4c566a;

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--n0); color: var(--n6); }
      body {
        font-family: var(--serif);
        min-height: 100vh;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; text-decoration: none; }

      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 80px 56px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 72px;
        align-items: start;
      }

      .identity h1 {
        font-family: var(--serif);
        font-weight: 400;
        font-size: 48px;
        line-height: 1.05;
        margin: 0 0 18px;
        letter-spacing: -0.8px;
      }
      .hello {
        font-family: var(--serif);
        font-style: italic;
        font-size: 18px;
        color: var(--n4);
        margin: 0 0 22px;
        opacity: 0.9;
      }
      .meta {
        margin-top: 4px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--n3);
        line-height: 1.9;
      }
      .meta .email { color: var(--n8); }
      .meta .email:hover { color: var(--n6); }

      .socials {
        margin-top: 14px;
        display: flex;
        gap: 14px;
        align-items: center;
      }
      .socials a {
        color: var(--n3);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        transition: color 0.15s ease;
      }
      .socials a:hover { color: var(--accent); }
      .socials svg { width: 18px; height: 18px; display: block; }

      .index-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--n3);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 8px 0 4px;
      }
      .index-list { border-bottom: 1px solid var(--n1); }
      .index-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: baseline;
        padding: 16px 4px;
        border-top: 1px solid var(--n1);
        transition: background 0.15s ease;
      }
      .index-item:hover { background: rgba(208, 135, 112, 0.05); }
      .index-num {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--n3);
        font-variant-numeric: tabular-nums;
      }
      .index-title {
        font-family: var(--serif);
        font-size: 22px;
        color: var(--n6);
        font-weight: 400;
        transition: color 0.15s ease;
      }
      .index-item:hover .index-title { color: var(--accent); }
      .index-arrow {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--n3);
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
      .index-item:hover .index-arrow {
        opacity: 1;
        transform: translateX(0);
        color: var(--accent);
      }

      @media (max-width: 720px) {
        .page {
          grid-template-columns: 1fr;
          gap: 48px;
          padding: 56px 28px;
          max-width: 520px;
        }
        .identity h1 { font-size: 40px; }
        .hello { font-size: 17px; margin-bottom: 18px; }
        .index-title { font-size: 19px; }
        .index-item {
          grid-template-columns: 1fr auto;
          padding: 14px 2px;
        }
        .index-arrow { opacity: 1; transform: translateX(0); }
      }

      @media (max-width: 380px) {
        .page { padding: 44px 22px; }
        .identity h1 { font-size: 34px; }
      }
    </style>
