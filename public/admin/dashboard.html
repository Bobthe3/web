<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Analytics Dashboard - Devan Velji</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="../styles/theme.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }
        .navbar {
            background-color: var(--navbar-bg);
            padding: 10px 0;
            text-align: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        .navbar h1 { margin: 0; font-size: 1.5em; }
        .navbar a { color: var(--text-color); text-decoration: none; }
        #logout-btn {
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            background: var(--accent-hover);
            color: #fff;
            border: none;
            font-size: 0.85em;
        }
        .container {
            margin: 80px auto 50px;
            max-width: 1000px;
            padding: 0 20px;
        }
        .frosted-glass {
            background: var(--frosted-bg);
            border-radius: 18px;
            box-shadow: 0 4px 32px 0 var(--shadow-color);
            backdrop-filter: blur(12px) saturate(1.5);
            padding: 24px 28px;
            margin-bottom: 20px;
        }
        .section-title { color: var(--accent-primary); margin: 0 0 16px; font-size: 1.2em; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: 700; color: var(--accent-primary); }
        .stat-label { font-size: 0.85em; color: var(--accent-secondary); margin-top: 4px; }

        /* Time filter */
        .time-filter { display: flex; gap: 8px; margin-bottom: 20px; }
        .time-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid var(--accent-primary);
            background: transparent;
            color: var(--accent-primary);
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .time-btn.active, .time-btn:hover { background: var(--accent-primary); color: #fff; }

        /* Data table */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(76,86,106,0.2); font-size: 0.9em; }
        th { color: var(--accent-primary); }
        .bar-cell { display: flex; align-items: center; gap: 8px; }
        .bar { height: 6px; border-radius: 3px; background: var(--accent-primary); transition: width 0.3s; }
        .bar-count { font-size: 0.85em; color: var(--accent-secondary); min-width: 30px; text-align: right; }

        /* Login */
        #login-section { text-align: center; margin-top: 140px; }
        #login-section input {
            display: block;
            width: 100%;
            max-width: 360px;
            margin: 10px auto;
            padding: 12px 16px;
            border: 2px solid var(--accent-primary);
            border-radius: 10px;
            background: var(--frosted-bg);
            color: var(--text-color);
            font-size: 1em;
        }
        #login-section button {
            margin-top: 12px;
            padding: 12px 32px;
            background: var(--accent-primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
        }
        .loading { text-align: center; color: var(--accent-secondary); padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login-section">
        <div class="frosted-glass" style="max-width:420px;margin:0 auto;">
            <h2 style="color:var(--accent-primary);margin-top:0;">Dashboard Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-error" style="color:var(--accent-hover);display:none;">Invalid credentials.</p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <nav class="navbar">
            <h1><a href="index.html">Admin</a> / <a href="dashboard.html">Dashboard</a></h1>
            <button id="logout-btn">Logout</button>
        </nav>

        <div class="container">
            <div class="time-filter">
                <button class="time-btn" data-days="7">7 days</button>
                <button class="time-btn active" data-days="30">30 days</button>
                <button class="time-btn" data-days="365">All time</button>
            </div>

            <div class="stat-grid">
                <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total Events</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-inbound">-</div><div class="stat-label">Page Views</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-outbound">-</div><div class="stat-label">Outbound Clicks</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-internal">-</div><div class="stat-label">Internal Clicks</div></div>
            </div>

            <div class="frosted-glass">
                <h3 class="section-title">Inbound Sources</h3>
                <table><thead><tr><th>Source</th><th>Visits</th></tr></thead><tbody id="tbl-inbound"></tbody></table>
            </div>

            <div class="frosted-glass">
                <h3 class="section-title">Top Pages</h3>
                <table><thead><tr><th>Page</th><th>Views</th></tr></thead><tbody id="tbl-pages"></tbody></table>
            </div>

            <div class="frosted-glass">
                <h3 class="section-title">Outbound Clicks</h3>
                <table><thead><tr><th>URL</th><th>Clicks</th></tr></thead><tbody id="tbl-outbound"></tbody></table>
            </div>

            <div class="frosted-glass">
                <h3 class="section-title">Internal Navigation</h3>
                <table><thead><tr><th>Destination</th><th>Clicks</th></tr></thead><tbody id="tbl-internal"></tbody></table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
    <script>
    (function () {
      var firebaseConfig = {
        apiKey: 'YOUR_API_KEY',
        authDomain: 'devanveljiwebsite.firebaseapp.com',
        projectId: 'devanveljiwebsite'
      };
      firebase.initializeApp(firebaseConfig);
      var auth = firebase.auth();
      var functions = firebase.functions();

      // Auth
      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        auth.signInWithEmailAndPassword(
          document.getElementById('login-email').value,
          document.getElementById('login-password').value
        ).catch(function () {
          document.getElementById('login-error').style.display = 'block';
        });
      });

      document.getElementById('logout-btn').addEventListener('click', function () { auth.signOut(); });

      auth.onAuthStateChanged(function (user) {
        document.getElementById('login-section').classList.toggle('hidden', !!user);
        document.getElementById('dashboard-section').classList.toggle('hidden', !user);
        if (user) loadData(30);
      });

      // Time filter
      document.querySelectorAll('.time-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.time-btn').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          loadData(parseInt(btn.dataset.days));
        });
      });

      function loadData(days) {
        var getDashboard = functions.httpsCallable('dashboardData');
        getDashboard({ days: days }).then(function (result) {
          var d = result.data;
          document.getElementById('stat-total').textContent = d.totalEvents;
          document.getElementById('stat-inbound').textContent = d.inboundSources.reduce(function (s, r) { return s + r[1]; }, 0);
          document.getElementById('stat-outbound').textContent = d.outboundClicks.reduce(function (s, r) { return s + r[1]; }, 0);
          document.getElementById('stat-internal').textContent = d.internalClicks.reduce(function (s, r) { return s + r[1]; }, 0);

          fillTable('tbl-inbound', d.inboundSources);
          fillTable('tbl-pages', d.topPages);
          fillTable('tbl-outbound', d.outboundClicks);
          fillTable('tbl-internal', d.internalClicks);
        }).catch(function (e) { console.error('Dashboard error:', e); });
      }

      function fillTable(id, rows) {
        var tbody = document.getElementById(id);
        tbody.innerHTML = '';
        if (!rows || rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" style="color:var(--accent-secondary);text-align:center;">No data</td></tr>';
          return;
        }
        var max = rows[0][1];
        rows.forEach(function (r) {
          var tr = document.createElement('tr');
          var pct = Math.max((r[1] / max) * 100, 2);
          tr.innerHTML = '<td>' + esc(r[0]) + '</td>' +
            '<td><div class="bar-cell"><div class="bar" style="width:' + pct + 'px;min-width:4px;max-width:120px;"></div><span class="bar-count">' + r[1] + '</span></div></td>';
          tbody.appendChild(tr);
        });
      }

      function esc(s) {
        var d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }
    })();
    </script>
</body>
</html>
