# Auto-deploys the static site to Firebase Hosting whenever the prod branch
# is pushed. Manual runs are also allowed via the Actions tab (workflow_dispatch).
name: Build and Deploy to Firebase

on:
  push:
    branches:
      - prod
  workflow_dispatch:

concurrency:
  group: firebase-hosting-prod
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: public/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: public

      - name: Build (images.json, blog, feeds, sitemap)
        run: npm run build
        working-directory: public

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project devanveljiwebsite --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
